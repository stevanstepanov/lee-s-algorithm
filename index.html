<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lee Maze Algoritam</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f4f1ea;
      color: #222;
    }

    .header {
      width: calc(100vw - 32px);
      margin: 0 auto;
      padding: 8px 0 0;
      display: grid;
      grid-template-columns: 1fr;
      align-items: start;
      gap: 24px;
    }

    .logo {
      position: fixed;
      top: 2px;
      right: 16px;
      z-index: 4;
      width: 285px;
      height: auto;
      display: block;
    }

    .title-block {
      text-align: center;
    }

    .main-title {
      margin: 0;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 1;
      font-weight: 800;
    }

    .student-info {
      position: fixed;
      right: 18px;
      bottom: 16px;
      z-index: 5;
      text-align: right;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 700;
      color: #222;
    }

    .student-info p {
      margin: 0;
    }

    .subject-title {
      width: var(--board-size);
      margin: 8px 0 0;
      font-size: 13px;
      color: #666;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
    }

    .app {
      --board-size: min(620px, calc(100vh - 145px), calc(100vw - 430px));
      width: calc(100vw - 32px);
      margin: 0 0 0 118px;
      min-height: auto;
      display: grid;
      grid-template-columns: var(--board-size) 300px;
      gap: 30px;
      align-items: start;
      padding: 18px 0 0;
    }

    .board-area {
      width: var(--board-size);
    }

    #grid {
      width: var(--board-size);
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      grid-template-rows: repeat(20, 1fr);
      gap: 1px;
      background: #9c9c9c;
      border: 2px solid #222;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.15);
    }

    .cell {
      border: 0;
      background: #fff;
      color: #24506e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(9px, 1.6vw, 17px);
      font-weight: 700;
      padding: 0;
    }

    .cell:hover {
      background: #eee;
    }

    .start {
      background: #2f8f5b;
      color: white;
      font-size: clamp(13px, 2.2vw, 24px);
    }

    .target {
      background: #c4413d;
      color: white;
      font-size: clamp(13px, 2.2vw, 24px);
    }

    .wall {
      background: #222;
    }

    .visited {
      background: #cfe8ff;
      color: #24506e;
    }

    .path {
      background: #69c779;
      color: #153d24;
    }

    .panel h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1;
    }

    .panel-subtitle {
      margin: 4px 0 14px;
      color: #666;
      font-size: 20px;
      font-weight: 700;
    }

    #message {
      min-height: 76px;
      padding: 16px;
      margin-bottom: 14px;
      background: white;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
    }

    .control {
      width: 100%;
      height: 48px;
      margin-bottom: 10px;
      border: 1px solid #222;
      background: #222;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
    }

    .control:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .secondary {
      background: transparent;
      color: #222;
    }

    @media (max-width: 900px) {
      .header {
        grid-template-columns: 1fr 145px;
        gap: 12px;
      }

      .logo {
        position: static;
        width: 135px;
        justify-self: end;
      }

      .title-block {
        text-align: left;
      }

      .student-info {
        position: static;
        text-align: left;
        font-size: 15px;
      }

      .app {
        --board-size: min(100%, 560px);
        width: min(100vw - 24px, 680px);
        margin: 0 auto;
        grid-template-columns: 1fr;
        min-height: auto;
        padding-bottom: 20px;
      }

      .panel {
        order: -1;
      }

      #grid {
        margin: 0 auto;
      }

      .board-area,
      .subject-title {
        width: var(--board-size);
        margin-left: auto;
        margin-right: auto;
      }

      body {
        overflow: auto;
      }
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="title-block">
      <h1 class="main-title">Vezba 6 AUPDKVSI</h1>
    </div>
    <img class="logo" src="FTN-Logo.png" alt="FTN logo">
  </header>

  <main class="app">
    <section class="board-area">
      <div id="grid"></div>
      <p class="subject-title">Algoritmi u projektovanju digitalnih kola visokog stepena integracije</p>
    </section>

    <aside class="panel">
      <h1>Lee's Maze</h1>
      <p class="panel-subtitle">Algorithm</p>

      <div id="message">Klikni Start.</div>

      <button class="control" id="startBtn" type="button">Start</button>
      <button class="control" id="routeBtn" type="button" disabled>Start routing</button>
      <button class="control" id="obstaclesBtn" type="button" disabled>Add obstacles</button>
      <button class="control secondary" id="resetBtn" type="button">Reset</button>
    </aside>
  </main>

  <div class="student-info">
    <p>Student: Stevan Stepanov</p>
    <p>Broj indeksa: EE12/2012</p>
    <p>Datum: 20.05.2026</p>
  </div>

  <script>
    const SIZE = 20;
    const grid = document.getElementById("grid");
    const message = document.getElementById("message");
    const startBtn = document.getElementById("startBtn");
    const routeBtn = document.getElementById("routeBtn");
    const obstaclesBtn = document.getElementById("obstaclesBtn");
    const resetBtn = document.getElementById("resetBtn");
    const clickSound = new Audio("click.mp3");
    const startSound = new Audio("start.mp3");
    const winnerSound = new Audio("winner.mp3");
    const failedSound = new Audio("failed.mp3");

    clickSound.preload = "auto";
    startSound.preload = "auto";
    winnerSound.preload = "auto";
    failedSound.preload = "auto";

    let mode = "idle";
    let running = false;
    let start = null;
    let target = null;
    let walls = new Set();
    let cells = [];
    let dist = makeDistances();
    let lastRoutePath = [];

    function makeDistances() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
    }

    function key(r, c) {
      return r + "," + c;
    }

    function same(a, b) {
      return a && b && a.r === b.r && a.c === b.c;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function playSound(sound) {
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }

    function createGrid() {
      grid.innerHTML = "";
      cells = [];

      for (let r = 0; r < SIZE; r++) {
        const row = [];

        for (let c = 0; c < SIZE; c++) {
          const cell = document.createElement("button");
          cell.type = "button";
          cell.className = "cell";
          cell.addEventListener("click", () => cellClick(r, c));
          row.push(cell);
          grid.appendChild(cell);
        }

        cells.push(row);
      }

      render();
    }

    function render() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const cell = cells[r][c];
          const p = { r: r, c: c };

          cell.className = "cell";
          cell.textContent = "";

          if (same(start, p)) {
            cell.classList.add("start");
            cell.textContent = "S";
          } else if (same(target, p)) {
            cell.classList.add("target");
            cell.textContent = "T";
          } else if (walls.has(key(r, c))) {
            cell.classList.add("wall");
          } else if (dist[r][c] !== null) {
            cell.classList.add("visited");
            cell.textContent = dist[r][c];
          }
        }
      }
    }

    function clearSearch() {
      dist = makeDistances();

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          cells[r][c].classList.remove("visited", "path");
          if (!same(start, { r: r, c: c }) && !same(target, { r: r, c: c })) {
            cells[r][c].textContent = "";
          }
        }
      }
    }

    function cellClick(r, c) {
      if (running) return;

      playSound(clickSound);

      const p = { r: r, c: c };
      const id = key(r, c);

      if (mode === "set-start") {
        start = p;
        target = null;
        walls.delete(id);
        lastRoutePath = [];
        obstaclesBtn.disabled = true;
        mode = "set-target";
        message.textContent = "Postavi target.";
        render();
        return;
      }

      if (mode === "set-target") {
        if (same(start, p)) {
          message.textContent = "Target mora biti drugo polje.";
          return;
        }

        target = p;
        walls.delete(id);
        lastRoutePath = [];
        obstaclesBtn.disabled = true;
        mode = "set-walls";
        routeBtn.disabled = false;
        message.textContent = "Postavi prepreke, pa klikni Start routing.";
        render();
        return;
      }

      if (mode === "set-walls") {
        if (same(start, p) || same(target, p)) return;

        lastRoutePath = [];
        obstaclesBtn.disabled = true;

        if (walls.has(id)) {
          walls.delete(id);
        } else {
          walls.add(id);
        }

        clearSearch();
        render();
      }
    }

    function neighbors(p) {
      const possible = [
        { r: p.r - 1, c: p.c },
        { r: p.r + 1, c: p.c },
        { r: p.r, c: p.c - 1 },
        { r: p.r, c: p.c + 1 }
      ];

      return possible.filter(n =>
        n.r >= 0 &&
        n.r < SIZE &&
        n.c >= 0 &&
        n.c < SIZE &&
        !walls.has(key(n.r, n.c))
      );
    }

    async function startRouting() {
      if (!start || !target || running) return;

      running = true;
      startBtn.disabled = true;
      routeBtn.disabled = true;
      obstaclesBtn.disabled = true;
      lastRoutePath = [];
      clearSearch();
      render();
      message.textContent = "Algoritam se siri u talasima...";

      const queue = [start];
      dist[start.r][start.c] = 0;
      let found = false;

      while (queue.length > 0 && !found) {
        const waveSize = queue.length;
        const newCells = [];

        for (let i = 0; i < waveSize; i++) {
          const current = queue.shift();
          const nextDistance = dist[current.r][current.c] + 1;

          for (const next of neighbors(current)) {
            if (dist[next.r][next.c] !== null) continue;

            dist[next.r][next.c] = nextDistance;
            queue.push(next);
            newCells.push(next);

            if (same(next, target)) {
              found = true;
            }
          }
        }

        for (const p of newCells) {
          if (!same(p, target)) {
            cells[p.r][p.c].classList.add("visited");
            cells[p.r][p.c].textContent = dist[p.r][p.c];
          }
        }

        await sleep(80);
      }

      if (!found) {
        message.textContent = "Ne postoji put do targeta.";
        playSound(failedSound);
        running = false;
        startBtn.disabled = true;
        routeBtn.disabled = true;
        obstaclesBtn.disabled = true;
        return;
      }

      message.textContent = "Target pronadjen. Radim backtrack...";
      await backtrack();
      await sleep(400);
      removeNumbers();
      playSound(winnerSound);

      message.textContent = "Gotovo. Zelena polja su najkraca putanja.";
      running = false;
      routeBtn.disabled = false;
      obstaclesBtn.disabled = false;
    }

    async function backtrack() {
      let current = target;
      const path = [];

      while (!same(current, start)) {
        path.push(current);
        const currentDistance = dist[current.r][current.c];

        current = neighbors(current).find(n => dist[n.r][n.c] === currentDistance - 1);
        if (!current) break;
      }

      lastRoutePath = path.concat([start]);

      for (const p of path) {
        if (same(p, target)) continue;

        cells[p.r][p.c].classList.remove("visited");
        cells[p.r][p.c].classList.add("path");
        await sleep(55);
      }
    }

    function removeNumbers() {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (same(start, { r: r, c: c })) {
            cells[r][c].textContent = "S";
          } else if (same(target, { r: r, c: c })) {
            cells[r][c].textContent = "T";
          } else {
            cells[r][c].textContent = "";
          }
        }
      }
    }

    function reset() {
      mode = "idle";
      running = false;
      start = null;
      target = null;
      walls.clear();
      dist = makeDistances();
      lastRoutePath = [];
      startBtn.disabled = false;
      routeBtn.disabled = true;
      obstaclesBtn.disabled = true;
      message.textContent = "Klikni Start.";
      render();
    }

    function addObstaclesFromRoute() {
      if (running || lastRoutePath.length === 0) return;

      for (const p of lastRoutePath) {
        walls.add(key(p.r, p.c));
      }

      start = null;
      target = null;
      dist = makeDistances();
      lastRoutePath = [];
      mode = "set-start";
      startBtn.disabled = true;
      routeBtn.disabled = true;
      obstaclesBtn.disabled = true;
      message.textContent = "Putanja je dodata kao prepreka. Postavi novi start.";
      render();
    }

    startBtn.addEventListener("click", () => {
      playSound(clickSound);
      mode = "set-start";
      start = null;
      target = null;
      walls.clear();
      dist = makeDistances();
      lastRoutePath = [];
      startBtn.disabled = true;
      routeBtn.disabled = true;
      obstaclesBtn.disabled = true;
      message.textContent = "Postavi start.";
      render();
    });

    routeBtn.addEventListener("click", () => {
      playSound(startSound);
      startRouting();
    });

    obstaclesBtn.addEventListener("click", () => {
      playSound(clickSound);
      addObstaclesFromRoute();
    });

    resetBtn.addEventListener("click", () => {
      playSound(clickSound);
      reset();
    });

    createGrid();
  </script>
</body>
</html>
